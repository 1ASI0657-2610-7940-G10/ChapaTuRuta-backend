server:
  port: ${PORT:8082}

spring:
  application:
    name: tracking-service

  data:
    redis:
      # Credenciales dinámicas para conectar con Upstash Redis en la nube
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  rabbitmq:
    # Credenciales dinámicas para conectar con CloudAMQP en la nube
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL:false}
    template:
      default-receive-queue: tracking.queue
      exchange: tracking.exchange
      routing-key: tracking.routing.key

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

