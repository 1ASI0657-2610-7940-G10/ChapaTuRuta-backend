server:
  port: 8082

spring:
  application:
    name: tracking-service
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html


    mapbox:
      api-key: ${MAPBOX_API_KEY}

    spring:
      rabbitmq:
        template:
          default-receive-queue: tracking.queue
          exchange: tracking.exchange
          routing-key: tracking.routing.key