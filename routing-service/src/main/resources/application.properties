spring.application.name=routing-service
server.port=${PORT:8081}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/routing_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:khafna09}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Si creaste el esquema en Supabase, descomenta la siguiente linea:
spring.jpa.properties.hibernate.default_schema=routing_schema

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html