spring.application.name=identity-service
# Render inyecta su propio puerto dinamicamente, dejamos el 8080 como respaldo local
server.port=${PORT:8080}

# Usamos variables de entorno para la nube
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/identity_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:khafna09}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Si creaste el esquema en Supabase, descomenta la siguiente linea:
spring.jpa.properties.hibernate.default_schema=identity_schema

jwt.secret=${JWT_SECRET:ChapaTuRutaSecretKeyJWT}
jwt.expiration=86400000