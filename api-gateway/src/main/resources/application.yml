server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux: # <-- ESTO ES LO NUEVO QUE PIDE SPRING
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
          routes:
            - id: identity-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/auth/**

            - id: routing-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/routes/**

            - id: tracking-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/tracking/**, /api/v1/demand/**