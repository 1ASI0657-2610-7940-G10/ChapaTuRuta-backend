server:
  port: ${PORT:9000}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
          routes:
            - id: identity-service
              uri: ${IDENTITY_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - JwtAuthentication # Aplica el filtro de seguridad a esta ruta

            - id: routing-service
              uri: ${ROUTING_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/routes/**
              filters:
                - JwtAuthentication

            - id: tracking-service
              uri: ${TRACKING_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/tracking/**, /api/v1/demand/**
              filters:
                - JwtAuthentication